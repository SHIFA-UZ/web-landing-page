<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 – Page Not Found | SHIFA</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #00BBB0;
      --color-primary-hover: #59C2BC;
      --color-text: #0D1117;
      --color-muted: #5B6778;
      --color-bg: #FFFFFF;
      --color-off: #F7F9FB;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #0D1117;
        --color-off: #161B22;
        --color-text: #E6EDF3;
        --color-muted: #8B949E;
      }
    }

    body {
      font-family: 'Manrope', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      text-align: center;
      padding: 24px;
    }

    .container {
      max-width: 480px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin-bottom: 32px;
    }

    .code {
      font-size: clamp(5rem, 15vw, 8rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--color-primary), #009E93);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .message {
      color: var(--color-muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--color-primary);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .btn:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="/assets/images/logo.png" alt="SHIFA logo" />
    <p class="code">404</p>
    <h1 class="title" id="title">Page not found</h1>
    <p class="message" id="message">The page you're looking for doesn't exist or has been moved.</p>
    <a class="btn" href="https://shifa.uz">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12" />
        <polyline points="12 19 5 12 12 5" />
      </svg>
      <span id="btn">Back to SHIFA</span>
    </a>
  </div>
  <script>
    var t = {
      de: { title: 'Seite nicht gefunden', message: 'Die gesuchte Seite existiert nicht oder wurde verschoben.', btn: 'Zurück zu SHIFA' },
      uz: { title: 'Sahifa topilmadi', message: 'Siz qidirayotgan sahifa mavjud emas yoki koʻchirilgan.', btn: 'SHIFA ga qaytish' },
      ru: { title: 'Страница не найдена', message: 'Страница, которую вы ищете, не существует или была перемещена.', btn: 'Вернуться на SHIFA' }
    };
    try {
      var lang = localStorage.getItem('shifa-lang');
      if (lang && t[lang]) {
        document.documentElement.lang = lang;
        document.getElementById('title').textContent = t[lang].title;
        document.getElementById('message').textContent = t[lang].message;
        document.getElementById('btn').textContent = t[lang].btn;
      }
    } catch(e) {}
  </script>
</body>
</html>
